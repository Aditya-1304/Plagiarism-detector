<!DOCTYPE html>
<html>
<head>
    <title>Similarity Results</title>
</head>
<body>
    <h1>Similarity Results</h1>
    <table border="1">
        <thead>
            <tr>
                <th>Title</th>
                <th>Cosine Similarity</th>
                <th>Fuzzy Similarity</th>
            </tr>
        </thead>
        <tbody>
            {% for result in results %}
            <tr>
                <td>{{ result.title }}</td>
                <td>{{ result.cosine_similarity }}</td>
                <td>{{ result.fuzzy_similarity }}</td>
            </tr>
            {% endfor %}
        </tbody>
    </table>
</body>
</html>
